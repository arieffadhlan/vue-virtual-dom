name: CI

on:
    push:
    pull_request:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    quality:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.0

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Type check
              run: bun run type-check

            - name: Lint
              run: bun run lint

            - name: Unit test
              run: bun run test:unit

            - name: Build
              run: bun run build
